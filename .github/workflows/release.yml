name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Prepare stable Android artifact names
        run: |
          mkdir -p build/release
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/release/UWHLife_android_armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/release/UWHLife_android_arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk build/release/UWHLife_android_x86_64.apk
          shasum -a 256 build/release/UWHLife_android_armeabi-v7a.apk | awk '{print $1}' > build/release/android_armeabi_v7a.sha256
          shasum -a 256 build/release/UWHLife_android_arm64-v8a.apk | awk '{print $1}' > build/release/android_arm64.sha256
          shasum -a 256 build/release/UWHLife_android_x86_64.apk | awk '{print $1}' > build/release/android_x86_64.sha256

      - name: Build iOS app without codesigning
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: bash scripts/package_unsigned_ipa.sh --name "UWHLife_unsigned.ipa"

      - name: Prepare stable iOS artifact name
        run: cp build/ios/ipa/UWHLife_unsigned.ipa build/release/UWHLife_unsigned.ipa

      - name: Update release metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_DATE: ${{ github.event.head_commit.timestamp }}
          IPA_SIZE: ${{ hashFiles('build/release/UWHLife_unsigned.ipa') }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          export RELEASE_DATE="$(date -u +%Y-%m-%d)"
          export IPA_SIZE="$(wc -c < build/release/UWHLife_unsigned.ipa | tr -d ' ')"
          export ANDROID_ARMEABI_V7A_SHA256="$(cat build/release/android_armeabi_v7a.sha256)"
          export ANDROID_ARM64_SHA256="$(cat build/release/android_arm64.sha256)"
          export ANDROID_X86_64_SHA256="$(cat build/release/android_x86_64.sha256)"
          dart run tool/update_release_metadata.dart

      - name: Commit updated metadata to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git add source.json update.json
          git commit -m "chore: update release metadata for ${{ github.ref_name }}" || exit 0
          git push origin main

      - name: Publish artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: build/release/*
