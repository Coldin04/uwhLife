name: uwhlife
description: "uwhLife, a Flutter campus life toolkit for UWH students."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.3.1+15

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI and platform integration.
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.11.0
  webview_flutter_wkwebview: ^3.24.5
  mobile_scanner: ^5.2.3
  image_picker: ^1.2.1
  flutter_reactive_ble: ^5.4.2
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  crypto: ^3.0.6
  html: ^0.15.6
  pointycastle: ^3.9.1

  # Local persistence and credentials.
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2
  share_plus: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Test doubles for platform channels used by widget/unit tests.
  package_info_plus_platform_interface: ^3.2.1
  webview_flutter_platform_interface: ^2.15.1

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/app_list.json
    - icon.png

  fonts:
    - family: AlibabaPuHuiTi
      fonts:
        - asset: assets/fonts/AlibabaPuHuiTi-Regular.ttf
          weight: 400
        - asset: assets/fonts/AlibabaPuHuiTi-Medium.ttf
          weight: 500
        - asset: assets/fonts/AlibabaPuHuiTi-Bold.ttf
          weight: 700
